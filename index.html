<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHS Rechnungsmanagement</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Design System -->
    <link rel="stylesheet" href="src/index.css">
</head>
<body>

    <!-- Sidebar Navigation (Desktop) / Tab-Bar (Mobile) -->
    <aside id="sidebar">
        <div class="logo-area">
            <div class="logo-text">GHS <span>MANAGER</span></div>
            <div style="font-size: 9px; color: var(--text-muted); margin-top: 4px; opacity: 0.6;">Heizung & Sanitär v1.0</div>
        </div>
        
        <nav id="main-nav">
            <a href="#dashboard" class="nav-item active" data-view="dashboard">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="#rechnung-neu" class="nav-item" data-view="rechnungen">
                <i class="fa-solid fa-file-invoice-dollar"></i> Neue Rechnung
            </a>
            <a href="#rechnungen" class="nav-item" data-view="rechnungsliste">
                <i class="fa-solid fa-list-check"></i> Alle Belege
            </a>
            <a href="#kunden" class="nav-item" data-view="kunden">
                <i class="fa-solid fa-user-group"></i> Stammkunden
            </a>
            <a href="#einstellungen" class="nav-item" data-view="settings">
                <i class="fa-solid fa-gears"></i> Einstellungen
            </a>
        </nav>
        
        <div class="sidebar-footer">
            &copy; 2026 GHS Heizung & Sanitär<br>
            Design by Antigravity
        </div>
    </aside>

    <!-- Main Content Area -->
    <main id="content-area">
        <div class="container" id="view-container">
            <!-- Dynamic Content Injected by app.js -->
            <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
                <div class="spinner"></div> 
            </div>
        </div>
    </main>

    <!-- App Logic Injection -->
    <script type="module" src="src/app.js"></script>
</body>
</html>
